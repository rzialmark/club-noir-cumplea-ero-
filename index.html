<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Noir</title>

<style>

:root{
--paper:#d9c3a2;
--paper-dark:#cfb088;
--ink:#191612;
--red:#b12d27;
--blue:#426a88;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
margin:0;
min-height:100%;
font-family:"Courier New",monospace;
background:#5f4d3e;
}

body{
display:flex;
align-items:center;
justify-content:center;
padding:12px;
}

.app{
width:min(430px,100%);
height:min(860px,calc(100vh - 24px));
position:relative;
overflow:hidden;
border-radius:28px;
box-shadow:0 28px 70px rgba(0,0,0,.35);
background:#a18464;
}

.screen{
position:absolute;
inset:0;
background:
radial-gradient(circle at 16% 18%, rgba(255,255,255,.08), transparent 18%),
linear-gradient(180deg,var(--paper),var(--paper-dark));
transition:.8s;
}

.hidden{
opacity:0;
pointer-events:none;
}

.left{
transform:translateX(-108%);
}

.right{
transform:translateX(108%);
}

/* SOBRE */

.envelope-stage{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

.envelope-wrap{
position:relative;
width:min(330px,86%);
aspect-ratio:.68;
}

.envelope{
position:absolute;
inset:0;
background:linear-gradient(180deg,#d9c19f,#cfb089);
border:1px solid rgba(0,0,0,.14);
box-shadow:0 22px 50px rgba(0,0,0,.22);
}

.envelope-top{
position:absolute;
left:0;
right:0;
top:0;
height:88px;
background:linear-gradient(180deg,#e0c9a8,#cfb089);
border-bottom:2px solid rgba(0,0,0,.08);
transform-origin:top;
transition:.8s;
}

.envelope-wrap.open .envelope-top{
transform:rotateX(180deg);
}

.envelope-heading{
position:absolute;
left:50%;
top:120px;
transform:translateX(-50%);
text-align:center;
color:var(--ink);
}

.envelope-heading .title{
font-size:32px;
}

.envelope-heading .sub{
font-size:18px;
margin-top:4px;
}

.stamp{
position:absolute;
left:50%;
top:260px;
transform:translateX(-50%) rotate(-4deg);
}

.stamp-main{
border:4px solid var(--red);
color:var(--red);
padding:8px 14px;
font-size:22px;
font-weight:700;
background:white;
}

.open-btn{
position:absolute;
inset:0;
border:none;
background:transparent;
cursor:pointer;
}

.tap-note{
position:absolute;
bottom:52px;
left:0;
right:0;
text-align:center;
font-size:13px;
}

/* DOCUMENTO */

.doc{
position:absolute;
inset:0;
padding:26px;
overflow:auto;
}

.seal{
border:4px solid var(--red);
color:var(--red);
padding:8px 14px;
display:inline-block;
font-weight:bold;
transform:rotate(-4deg);
}

h1{
margin-top:30px;
}

.meta{
margin-top:20px;
}

.row{
display:grid;
grid-template-columns:100px 1fr;
margin-bottom:8px;
}

.btn{
border:none;
padding:14px;
margin-top:10px;
cursor:pointer;
font-family:inherit;
}

.primary{
background:var(--red);
color:white;
}

.secondary{
background:var(--blue);
color:white;
}

/* OUTFITS */

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.7);
display:none;
}

.overlay.show{
display:block;
}

.polaroid{
position:absolute;
width:150px;
background:white;
padding:8px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
cursor:pointer;
}

.polaroid img{
width:100%;
filter:grayscale(1);
}

.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
}

.lightbox.show{
display:flex;
}

.lightbox img{
max-width:90%;
max-height:80vh;
}

</style>
</head>

<body>

<div class="app">

<!-- SOBRE -->

<section class="screen" id="screenEnvelope">

<div class="envelope-stage">

<div class="envelope-wrap" id="envelopeWrap">

<div class="envelope">

<div class="envelope-top"></div>

<div class="envelope-heading">
<div class="title">CLUB NOIR</div>
<div class="sub">Cumpleañero</div>
</div>

<div class="stamp">
<div class="stamp-main">CLICK TO OPEN</div>
</div>

<button class="open-btn" id="openBtn"></button>

</div>

</div>

<div class="tap-note">Toca el sobre para abrir el archivo</div>

</div>

</section>


<!-- DOCUMENTO -->

<section class="screen hidden right" id="screenMain">

<div class="doc">

<div class="seal">TOP SECRET</div>

<h1>CLUB NOIR</h1>

<p>Cumpleañero</p>

<div class="meta">

<div class="row"><b>Fecha:</b><span>Sábado 14 de marzo</span></div>
<div class="row"><b>Hora:</b><span>5:00 PM</span></div>
<div class="row"><b>Dress:</b><span>Film Noir Fit</span></div>

</div>

<button class="btn primary" id="confirmBtn">
CONFIRMAR ASISTENCIA
</button>

<button class="btn secondary" id="outfitsBtn">
VER OUTFITS
</button>

</div>

</section>


<!-- OUTFITS -->

<div class="overlay" id="overlay">

<figure class="polaroid" style="top:100px;left:20px;transform:rotate(-6deg)">
<img src="IMG1.jpg">
</figure>

<figure class="polaroid" style="top:100px;right:20px;transform:rotate(6deg)">
<img src="IMG2.jpg">
</figure>

<figure class="polaroid" style="top:300px;left:40px;transform:rotate(-4deg)">
<img src="IMG3.jpg">
</figure>

<figure class="polaroid" style="top:300px;right:40px;transform:rotate(4deg)">
<img src="IMG4.jpg">
</figure>

<figure class="polaroid" style="top:480px;left:80px;transform:rotate(-5deg)">
<img src="IMG5.jpg">
</figure>

<figure class="polaroid" style="top:480px;right:80px;transform:rotate(5deg)">
<img src="IMG6.jpg">
</figure>

</div>

<div class="lightbox" id="lightbox">
<img id="lightboxImg">
</div>

</div>

<script>

const openBtn=document.getElementById("openBtn");
const screenEnvelope=document.getElementById("screenEnvelope");
const screenMain=document.getElementById("screenMain");
const envelopeWrap=document.getElementById("envelopeWrap");

openBtn.onclick=()=>{
envelopeWrap.classList.add("open");

setTimeout(()=>{
screenEnvelope.classList.add("left");
screenMain.classList.remove("hidden");
screenMain.classList.remove("right");
},800)
}

const overlay=document.getElementById("overlay");
document.getElementById("outfitsBtn").onclick=()=>{
overlay.classList.add("show")
}

overlay.onclick=()=>{
overlay.classList.remove("show")
}

</script>

</body>
</html>
